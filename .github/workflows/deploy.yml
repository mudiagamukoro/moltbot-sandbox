name: Deploy Worker + Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
